# Herramienta para instalar y actualizar programas en Arch Linux.
# Permite usar repos oficiales y paquetes de la comunidad desde un solo lugar.
# Referencia:
#   man 5 paru.conf
#   https://github.com/Morganamilo/paru/blob/master/man/paru.conf.5

# ╒═════════════════════════════════════════════════════════════╕
# │                     OPCIONES GENERALES                      │
# ╘═════════════════════════════════════════════════════════════╛
[options]

# CleanAfter ----------------------------------------------------------------
# Elimina los directorios temporales src/ y pkg/ después de instalar un
# paquete, liberando espacio. Los directorios VCS (.git, etc.) se conservan
# para que la próxima actualización solo haga pull en vez de clonar todo
# de nuevo.
  CleanAfter

# NewsOnUpgrade -------------------------------------------------------------
# Muestra las noticias recientes de https://archlinux.org/news antes de
# cada actualización del sistema (sysupgrade). Útil para estar al tanto
# de avisos importantes oficiales.
  NewsOnUpgrade

# BottomUp ------------------------------------------------------------------
# Invierte el orden de los resultados de búsqueda: los paquetes del AUR
# aparecen primero y la lista se muestra de abajo hacia arriba. Esto evita
# hacer scroll para ver los resultados del AUR.
  BottomUp

# SortBy --------------------------------------------------------------------
# Ordena los resultados de búsqueda del AUR según el campo indicado. Por
# defecto paru ordena por votos (votes). Los valores posibles son: votes,
# popularity, name, base, submitted, modified, id, baseid. Ver:
# https://aur.archlinux.org/packages/
  SortBy = modified

# SkipReview ----------------------------------------------------------------
# Omite la revisión interactiva del PKGBUILD antes de instalar/actualizar.
# Desactívala (coméntala) si prefieres revisar manualmente cada PKGBUILD
# antes de compilar.
  SkipReview

# Provides ------------------------------------------------------------------
# Permite resolver dependencias y targets usando paquetes que declaran
# compatibilidad mediante 'provides='. Con 'all' aplica a todos los
# paquetes, no solo a los targets solicitados explícitamente.
  Provides = all

# PgpFetch ------------------------------------------------------------------
# Importa automáticamente claves PGP desconocidas desde el campo
# validpgpkeys del PKGBUILD durante la instalación.
  PgpFetch

# Devel ---------------------------------------------------------------------
# Verifica actualizaciones de paquetes de desarrollo (-git, -cvs, -svn,
# -bzr, -darcs, -hg, -fossil) durante sysupgrade usando git ls-remote.
  Devel

# DevelSuffixes -------------------------------------------------------------
# Sufijos que determinan qué paquetes se consideran "de desarrollo".
# Paru los usa para decidir si aplicar --needed y para tracking devel.
  DevelSuffixes = -git -svn -hg

# SudoLoop ------------------------------------------------------------------
# Ejecuta 'sudo' periódicamente en segundo plano para evitar que el
# timeout de sudo interrumpa compilaciones largas de paquetes AUR.
  SudoLoop
