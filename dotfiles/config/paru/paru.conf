# Herramienta para instalar y actualizar programas en Arch Linux.
# Permite usar repos oficiales y paquetes de la comunidad desde un solo lugar.
# Referencia:
#   man 5 paru.conf
#   https://github.com/Morganamilo/paru/blob/master/man/paru.conf.5

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                     OPCIONES GENERALES                      в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[options]

# CleanAfter ----------------------------------------------------------------
# Elimina los directorios temporales src/ y pkg/ despuГ©s de instalar un
# paquete, liberando espacio. Los directorios VCS (.git, etc.) se conservan
# para que la prГіxima actualizaciГіn solo haga pull en vez de clonar todo
# de nuevo.
  CleanAfter

# NewsOnUpgrade -------------------------------------------------------------
# Muestra las noticias recientes de https://archlinux.org/news antes de
# cada actualizaciГіn del sistema (sysupgrade). Гҡtil para estar al tanto
# de avisos importantes oficiales.
  NewsOnUpgrade

# BottomUp ------------------------------------------------------------------
# Invierte el orden de los resultados de bГәsqueda: los paquetes del AUR
# aparecen primero y la lista se muestra de abajo hacia arriba. Esto evita
# hacer scroll para ver los resultados del AUR.
  BottomUp

# SkipReview ----------------------------------------------------------------
# Omite la revisiГіn interactiva del PKGBUILD antes de instalar/actualizar.
# DesactГӯvala (comГ©ntala) si prefieres revisar manualmente cada PKGBUILD
# antes de compilar.
  SkipReview

# Provides ------------------------------------------------------------------
# Permite resolver dependencias y targets usando paquetes que declaran
# compatibilidad mediante 'provides='. Con 'all' aplica a todos los
# paquetes, no solo a los targets solicitados explГӯcitamente.
  Provides = all

# PgpFetch ------------------------------------------------------------------
# Importa automГЎticamente claves PGP desconocidas desde el campo
# validpgpkeys del PKGBUILD durante la instalaciГіn.
  PgpFetch

# Devel ---------------------------------------------------------------------
# Verifica actualizaciones de paquetes de desarrollo (-git, -cvs, -svn,
# -bzr, -darcs, -hg, -fossil) durante sysupgrade usando git ls-remote.
  Devel

# DevelSuffixes -------------------------------------------------------------
# Sufijos que determinan quГ© paquetes se consideran "de desarrollo".
# Paru los usa para decidir si aplicar --needed y para tracking devel.
  DevelSuffixes = -git -svn -hg

# SudoLoop ------------------------------------------------------------------
# Ejecuta 'sudo' periГіdicamente en segundo plano para evitar que el
# timeout de sudo interrumpa compilaciones largas de paquetes AUR.
  SudoLoop
