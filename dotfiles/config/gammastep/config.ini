; ╒════════════════════════════════════════════════════════════╕
; │        TRANSICIÓN BASADA EN ELEVACIÓN SOLAR (SUAVE)        │
; ╘════════════════════════════════════════════════════════════╛
; elevation-high (>0°)
;   - Retrasa el modo día hasta que el sol tenga altura real
;   - Evita cambios bruscos en el amanecer
;
; elevation-low (<0°)
;   - Adelanta el modo noche antes del ocaso real
;   - Reduce fatiga visual al caer la luz ambiental
;
; Enfoque:
;   • La transición se basa en la altura angular del sol, no en horas fijas
;   • El cambio ocurre de forma progresiva mientras varía la iluminación real
;   • Minimiza saltos perceptibles típicos en 0° (horizonte)
;   • Mejora la adaptación visual en entornos con variación rápida de luz

[general]

; ───────────────────< Ajustes de DÍA / DUSK >───────────────────
temp-day=6500
brightness-day=1.00

; SUNRISE
elevation-high=3.34

; ───────────────────< Ajustes de NOCHE /DAWN >──────────────────
temp-night=4800
brightness-night=0.85
gamma-night=0.8:0.7:0.8

; SUNSET
elevation-low=-0.29

; ─────────────────────────< UBICACIÓN >─────────────────────────
location-provider=manual

[manual]
lat=9.03
lon=-79.5
