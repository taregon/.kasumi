format = "[ $symbol $name]($style) "

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                         LENGUAJES                          в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[python]
symbol = "оңј "
style = "fg:color_env"
format = "[ $symbol$version]($style) "
version_format = "${raw}"

[lua]
format = "[оҳ  $version](bold fg:color_caution) "
version_format = "v${major}.${minor}"

[package]
disabled = false
symbol = "у°Ҹ— "
style = "fg:color_env"
format = "( [$symbol( $version)]($style) )"

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                            GIT                             в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[git_branch]
symbol = "у°ҳ¬ "
style = "fg:color_git"
format = "[ $symbol$branch]($style) "
only_attached = true
truncation_length = 25
truncation_symbol = "..."
disabled = false

[git_commit]
style = "fg:color_git"
format = "( [($tag)(@$hash)]($style) )"
commit_hash_length = 7
only_detached = true
tag_symbol = "у°“ј "
tag_disabled = false
disabled = false

[git_status]
style = "fg:color_git"
format = "([$all_status]($style) )"
stashed = "*${count}"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
up_to_date = ""
diverged = "вҮЎ${ahead_count}вҮЈ${behind_count}"
conflicted = "=${count}"
deleted = "Г—${count}"
renamed = "В»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
disabled = false

[git_state]
style = "fg:color_danger"
format = "([$state( $progress_current/$progress_total)]($style bold) )"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

[git_metrics]
format = "([+$added](added_style) [-$deleted](deleted_style))"
added_style = "fg:color_git_added"
deleted_style = "fg:color_git_deleted"
only_nonzero_diffs = true
disabled = false

