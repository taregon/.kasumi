"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
continuation_prompt = "[в–ёв–№ ](dimmed fg:color_line)"
scan_timeout = 35
command_timeout = 700

format = """
[в•ӯв”Җ](fg:color_line)\
[оӮә](fg:bg_mantle)\
[ у°«Ј  ](bg:bg_mantle fg:color_env)\
[оӮ°](bg:color_directory fg:bg_mantle)\
$directory\
[оӮ°](fg:color_directory)\
$git_branch\
$git_commit\
$git_status\
$git_state\
$git_metrics\
$docker_context\
$fill\
$python\
$status\
$cmd_duration\
$time\
$battery\
$line_break\
[в•°в”Җ](fg:color_line)\
$character\
"""

palette = "kasumi_colors"

[palettes.kasumi_colors]
color_ok = "#a6e3a1"
color_danger = "#f38ba8"
color_caution = "#f9e2af"
color_env = "#f5c2e7"
color_username = "#b4befe"
color_directory = "#f5c2e7"
color_git = "#a6e3a1"
color_git_added = "#94e2d5"
color_git_deleted = "#eba0ac"
color_docker = "#fab387"
color_time = "#89b4fa"
color_duration = "#f5e0dc"
color_line = "#5a656c"
# Fondos para formato powerline
bg_directorio = "#89b4fa"  # mismo que color_time
bg_git = "#a6e3a1"  # mismo que color_git/color_ok
bg_docker = "#fab387"  # mismo que color_docker
bg_mantle = "#343E43"

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                      SHELL / ENTRADA                       в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[character]
success_symbol = "[вқҜ](bold fg:color_username)"
error_symbol = "[вқҜ](bold fg:color_danger)"

[fill]
symbol = "в”„"
style = "fg:color_line"

[status]
disabled = false
symbol = "[ о°җ ](fg:color_danger) "
success_symbol = "[ о°җ ](fg:color_line) "
format = "$symbol "

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                      CONTEXTO USUARIO                      в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[username]
show_always = true
style_user = "fg:color_username"
style_root = "bold fg:color_danger"
format = "[ $user ]($style)"

[battery]
full_symbol = "у°ҮІ "
charging_symbol = "у°Ү¶ "
discharging_symbol = "у°ұӘ "

# CrГӯtico
[[battery.display]]
threshold = 15
style = "bold red"

# Bajo
[[battery.display]]
threshold = 40
style = "yellow"

# Normal / siempre visible
[[battery.display]]
threshold = 100
style = "green"

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                         NAVEGACIГ“N                         в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[directory]
style = "bg:color_directory fg:bg_mantle"
# read_only_style = "fg:color_directory"
# repo_root_style = "bold fg:color_directory"
format = "[ $path ]($style)"
read_only = " пҖЈ"
home_symbol = "~"
truncation_symbol = "вҖҘ/"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true

[directory.substitutions]
"Documents" = "уұ”ҳ "
"Downloads" = "п’ҳ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

# в•’в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв••
# в”Ӯ                   CONTENEDORES / RUNTIME                   в”Ӯ
# в•ҳв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ӣ
[docker_context]
symbol = "пҢҲ "
style = "fg:color_docker"
format = "[ $symbol $context]($style) "

[container]
symbol = "в¬ў"
