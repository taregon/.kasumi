[character]
success_symbol = "[Óįź]($bold fg:#b4befe)"
error_symbol = "[ÔĒõ]($bold fg:#f38ba8)"

[username]
show_always = true
style_user = "fg:color_username"
style_root = "bold fg:color_danger"
format = "[ $user ]($style)"

[directory]
style = "fg:color_directory"
read_only_style = "fg:color_directory"
repo_root_style = "bold fg:color_directory"
format = "[ $path ]($style)"
read_only = " ÔÄ£"
home_symbol = "~"
truncation_symbol = "‚Ä¶/"
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true

[git_branch]
symbol = "Ôźė"
style = "fg:color_git"
format = "( [$symbol $branch]($style) )"
only_attached = true
ignore_branches = []
truncation_length = 25
truncation_symbol = "..."
always_show_remote = false
disabled = false

[git_commit]
style = "fg:color_git"
format = "( [($tag)(@$hash)]($style) )"
commit_hash_length = 7
only_detached = true
tag_symbol = "ůįďľ "
tag_disabled = false
disabled = false

[git_status]
style = "fg:color_git"
format = "([$ahead_behind]($style) )([$all_status]($style) )"
stashed = "*${count}"
ahead = "‚á°${count}"
behind = "‚á£${count}"
up_to_date = ""
diverged = "‚á°${ahead_count}‚á£${behind_count}"
conflicted = "=${count}"
deleted = "√ó${count}"
renamed = "¬Ľ${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
ignore_submodules = false
disabled = false

[git_metrics]
format = "([([+$added]($added_style))([-$deleted]($deleted_style))](fg:color_git) )"
added_style = "fg:color_git_added"
deleted_style = "fg:color_git_deleted"
only_nonzero_diffs = true
disabled = false

[git_state]
style = "fg:color_danger"
format = "([$state( $progress_current/$progress_total)]($style bold) )"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

