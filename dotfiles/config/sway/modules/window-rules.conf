# vim: filetype=swayconfig
# ╒═════════════════════════════════════════════════════════════╕
# │                     VENTANAS FLOTANTES                      │
# ╘═════════════════════════════════════════════════════════════╛
# Para encontrar nombres de los procesos, ejecuta:
# swaymsg -t get_tree | grep app_id
# swaymsg -t get_tree | jq -c '.nodes[].nodes[].nodes[] | {id, app_id, name}'
# swaymsg -t get_tree | jq '.. | objects | select(.name? != null and .id? != null) | {name, app_id, id, focused, urgent}'
# swaymsg "[con_id=30] urgent enable"

set $opacity_alta 0.94
set $opacity_baja 0.88

# ── Engrampa ──────────────────────────────────────────────────

for_window [app_id="engrampa"] \
    floating enable

# ── Firefox ───────────────────────────────────────────────────

for_window [app_id="firefox"] \
    inhibit_idle fullscreen

for_window [app_id="firefox" title="Picture-in-Picture"] \
    floating enable, \
    sticky enable, \
    move position top left

# ── imv ───────────────────────────────────────────────────────

for_window [app_id="imv"] \
    floating enable, \
    border pixel 6, \
    move position center, \
    resize set width 70 ppt height 70 ppt

# ── KeePassXC ─────────────────────────────────────────────────

for_window [app_id="org.keepassxc.KeePassXC"] \
    move container to workspace number 3, \
    focus, \
    opacity $opacity_alta

# ── mpv ───────────────────────────────────────────────────────

for_window [app_id="mpv"] \
    floating enable, \
    border pixel 6, \
    move position center

# ── nm-connection-editor ──────────────────────────────────────

for_window [app_id="nm-connection-editor"] \
    floating enable

# ── Pavucontrol ───────────────────────────────────────────────

for_window [app_id="pavucontrol"] \
    floating enable, \
    resize set width 40 ppt height 30 ppt

# ── Telegram ──────────────────────────────────────────────────

assign [app_id="org.telegram.desktop"] 5

# ── Thunar ────────────────────────────────────────────────────

for_window [app_id="(?i)thunar"] \
    focus, \
    opacity $opacity_baja

for_window [app_id="(?i)thunar" title="Confirmar para reemplazar archivos"] \
    floating enable

for_window [app_id="(?i)thunar" title="Progreso de las operaciones de archivo"] \
    floating enable

# ── xed ───────────────────────────────────────────────────────

for_window [app_id="xed"] \
    opacity $opacity_alta

# ── Reglas por título (sin app_id fijo) ───────────────────────

for_window [title="(?i)^acerca de"] \
    floating enable

for_window [title="htop"] \
    floating enable, \
    resize set width 50 ppt height 70 ppt, \
    move position center

for_window [title="Renombrar"] \
    floating enable, \
    sticky enable
