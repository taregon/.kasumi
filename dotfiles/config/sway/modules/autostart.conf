# vim: filetype=swayconfig
# NOTE: --no-startup-id es un vestigio de i3/X11 (Startup Notification).
# Sway lo acepta por compatibilidad, pero en esta configuración Wayland no
# aporta beneficios prácticos, por lo que se omite.

# ╒═════════════════════════════════════════════════════════════╕
# │                  EJECUTAR AUTOMÁTICAMENTE                   │
# ╘═════════════════════════════════════════════════════════════╛
  # Fondo: matar instancia previa, asegurar daemon, aplicar fondo aleatorio.
  # awww-daemon gestiona el daemon; swaybg se descarta si no se usa.
  exec_always sh -c 'pkill -x swaybg'
  exec_always sh -c 'pgrep -x awww-daemon >/dev/null || awww-daemon'
  exec ~/.config/sway/scripts/wall-random-awww

  # Polkit: requerido para que apps gráficas soliciten privilegios root
  # (GParted, Balena Etcher, etc.) durante la sesión Sway.
  exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

  # swayidle: bloqueo de pantalla, DPMS y suspensión por inactividad.
  # El script centraliza la configuración de timeouts.
  exec ~/.config/sway/scripts/sway-idle

  # Mako: daemon de notificaciones D-Bus. Sway lo reutiliza si ya existe
  # en la sesión actual (idempotente).
  exec mako

  # mpdris2-rs: puente MPD -> MPRIS para playerctl/Waybar/media keys.
  # -n desactiva notificaciones propias: rmpc y mako ya las gestionan.
  exec_always sh -c 'pkill -x mpdris2-rs; mpdris2-rs -n'

  # gammastep: ajuste automático de temperatura de color según horario
  # y posición geográfica (similar a f.lux).
  exec gammastep

  # Portapapeles: cliphist almacena texto e imágenes para historial
  # compartido entre wl-paste y rofi.
  exec wl-paste --type text --watch cliphist store
  exec wl-paste --type image --watch cliphist store

  # Sonido de bienvenida: reproducción diferida para evitar conflicto
  # con la inicialización de PipeWire/PulseAudio.
  exec sh -c 'sleep 2 && pw-play "$HOME/.local/share/kasumi/sounds/system/login.ogg"'
