# ╚══════╝ ╚══╝╚══╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝     ╚═╝  ╚═╝
# Compositor Wayland compatible con Sway que añade efectos visuales
# como blur, sombras, esquinas redondeadas y atenuación de ventanas.

# ─[ CORNER RADIUS ]──────────────────────────────────────────
  corner_radius              3
  smart_corner_radius        enable

# ─[ SHADOWS ]────────────────────────────────────────────────
  shadows                    enable
  shadows_on_csd             enable
  shadow_blur_radius         12
  shadow_color               #6a9fa7cc
  shadow_inactive_color      #2E383DD4
  shadow_offset              0 0

# ─[ BLUR ]───────────────────────────────────────────────────
  blur                       enable
  blur_xray                  disable
  blur_radius                2
  blur_passes                4
  blur_noise                 0.04
  blur_brightness            1.2
#  blur_saturation 0.5

# ─[ DIM INACTIVE ]───────────────────────────────────────────
  default_dim_inactive          0.15
  dim_inactive_colors.unfocused #000000db
  dim_inactive_colors.urgent    #FFA563c4

# ─[ LAYER EFFECTS ]──────────────────────────────────────────
# Configuración de efectos para superficies layer-shell
#   Lista los namespaces layer-shell detectados por SwayFX (útil para layer_effects)
#   swaymsg -r -t get_outputs | jq '.[0].layer_shell_surfaces | .[] | .namespace'

  layer_effects "waybar" {
  blur enable;
  blur_xray enable;
  shadows disable;
#  corner_radius 4;
  }

  layer_effects "rofi" {
  blur enable;
  shadows enable;
  }
