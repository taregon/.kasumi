# vim: filetype=swayconfig
# ╒═════════════════════════════════════════════════════════════╕
# │                   APARIENCIA Y BORDES                       │
# ╘═════════════════════════════════════════════════════════════╛
# Probar temporalmente con:
# swaymsg gaps outer current set 8
# swaymsg gaps inner all set 8
  default_border          pixel 3
  default_floating_border pixel 2
  gaps                    inner 6
  gaps                    outer 2
  smart_gaps              off
  smart_borders           off
  font                    pango:JetbrainsMono Nerd Font 10

# ╒═════════════════════════════════════════════════════════════╕
# │                       TEMAS DE COLOR                        │
# ╘═════════════════════════════════════════════════════════════╛
# Bordes de ventanas
  set $accent_focus  #5dbdc9
  set $accent_idle   #4b565c
  set $accent_urgent #ffa563

# Fondos de pestañas
  set $bg_focus      #356c73
  set $bg_idle       #2e383d
  set $bg_urgent     #8b6044

# Bordes de pestañas
  set $border_focus  #74c6d1
  set $border_idle   #4f5c63
  set $border_urgent #ffb077

# Texto de pestañas
  set $text_focus    #a2d9e0
  set $text_idle     #7a8a94
  set $text_urgent   #ffcba4

  client.focused   $border_focus  $bg_focus  $text_focus  $bg_focus  $accent_focus
  client.unfocused $border_idle   $bg_idle   $text_idle   $bg_idle   $accent_idle
  client.urgent    $border_urgent $bg_urgent $text_urgent $bg_urgent $accent_urgent

# ╒═════════════════════════════════════════════════════════════╕
# │                   RENDERIZADO DE FUENTES                    │
# ╘═════════════════════════════════════════════════════════════╛
# Geometría subpixel: none (recomendado para paneles IPS/VA)
# Alternativas: rgb, bgr, vrgb, vbgr, gray
  output * subpixel none

# ╒═════════════════════════════════════════════════════════════╕
# │                 MONITORES DE ALTO REFRESCO                  │
# ╘═════════════════════════════════════════════════════════════╛
# ── ADAPTIVE SYNC (VRR / FreeSync / G-Sync Compatible) ─────────
# Activa Variable Refresh Rate: sincroniza el refresco del monitor
# con los FPS reales del compositor en vez de mantener un Hz fijo.
#
# Beneficios: reduce tearing y stuttering.
# Requisitos: monitor compatible + preferiblemente DisplayPort.
#
# Compatibilidad:
# • AMD (AMDGPU) → excelente
# • Intel (11ª gen o superior) → buena
# • NVIDIA → mejoró mucho con drivers recientes + sway/wlroots actual
#
# Verificar estado: swaymsg -t get_outputs
  output * adaptive_sync on

# Descomenta la siguiente línea si prefieres activarlo solo en un monitor específico
# (recomendado si tienes flickering en escritorio)
# output DP-1 adaptive_sync on

# ── MAX RENDER TIME ─────────────────────────────────────────────
# Define cuánto tiempo (en ms) reserva sway antes del scanout para
# componer el frame.
#
# • 'off' (recomendado por defecto): máxima estabilidad y menor latencia general.
#   Sway compone inmediatamente después del refresh → mejor comportamiento.
#
# • Valor bajo (ej. 2-6 ms): reduce latencia en juegos y aplicaciones fullscreen,
#   pero si es demasiado bajo puede causar frame drops o stuttering.
#
# Cómo encontrar el valor óptimo:
#   1. Ejecuta una aplicación fullscreen que renderice continuamente (glxgears, juego, etc.)
#   2. Prueba con: swaymsg output * max_render_time 1
#   3. Si ves caídas de frames, sube de 1 en 1 hasta que sea estable.
  output * max_render_time off

# Ejemplo para baja latencia (descomenta y ajusta según tus pruebas):
# output * max_render_time 3
