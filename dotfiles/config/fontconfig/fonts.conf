<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!--
    ───────────────────────< MONOSPACE >───────────────────────
    Preferida para terminales y código. -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>RecMonoSmCasual Nerd Font Mono</family>
            <family>Liberation Mono</family>
        </prefer>
    </alias>
    <!--
    ─────────────────────────< SERIF >─────────────────────────
    Para texto con remates, documentos y lectura prolongada. -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>IBM Plex Serif</family>
        </prefer>
    </alias>
    <!--
    ──────────────────────< SANS-SERIF >─────────────────────
    Para interfaces, web y texto general moderno. -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>UbuntuSans Nerd Font</family>
        </prefer>
    </alias>
    <!--
    ─────────────────────────< EMOJI >─────────────────────────
    Recomendado por múltiples guías para asegurar soporte global. -->
    <alias>
        <family>emoji</family>
        <prefer>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <!--
    ───────────────────────< IDIOMA / SCRIPT >───────────────────────
    Reglas específicas por idioma para coverage de caracteres. -->
    <!-- Japonés (ja): Agrega Noto Sans CJK JP como fallback principal
       para cubrir caracteres correctamente sin fallbacks indeseados. -->
    <match>
        <test compare="contains" name="lang">
            <string>ja</string>
        </test>
        <edit mode="prepend" name="family">
            <string>Noto Sans CJK JP</string>
        </edit>
    </match>
    <!--
    ────────────────< RENDERIZADO GLOBAL >───────────────────────
    Configuración base para todas las fuentes del sistema. -->
    <match target="font">
        <!-- Antialiasing: Suavizado de bordes en fuentes escalables.
         Siempre activado en sistemas modernos para mejor calidad. -->
        <edit mode="assign" name="antialias">
            <bool>true</bool>
        </edit>
        <!-- Hinting: Ajuste de píxeles para alinear con la cuadrícula.
         Activado para mejorar nitidez en tamaños pequeños/medianos. -->
        <edit mode="assign" name="hinting">
            <bool>true</bool>
        </edit>
        <!-- Estilo de hinting: Moderado, equilibra nitidez y naturalidad.
         Opciones: hintnone, hintslight, hintmedium, hintfull. -->
        <edit mode="assign" name="hintstyle">
            <const>hintslight</const>
        </edit>
        <!-- Subpixel: Orden RGB para paneles IPS horizontales estándar. -->
        <edit mode="assign" name="rgba">
            <const>rgb</const>
        </edit>
        <!-- Filtro LCD: Mejora la claridad en renderizado subpíxel.
         lcddefault es el valor equilibrado recomendado por defecto. -->
        <edit mode="assign" name="lcdfilter">
            <const>lcddefault</const>
        </edit>
        <!-- Embedded Bitmaps: Por defecto fontconfig usa el outline vectorial.
           Desactivar fuerza el uso de outline en lugar de bitmaps embebidos.
           Recomendado para evitar bitmaps feos en fuentes como Calibri/Cambria
           en tamaños pequeños. ref: Arch Wiki, fontconfig docs. -->
        <edit mode="assign" name="embeddedbitmap">
            <bool>false</bool>
        </edit>
        <!-- Autohint: Usa el auto-hinter de FreeType en lugar del hinting nativo
           de la fuente. Útil cuando el hinting nativo no está disponible o falla
           en ciertas fuentes. ref: fontconfig manpage. -->
        <edit mode="assign" name="autohint">
            <bool>true</bool>
        </edit>
    </match>
    <!--
    ────────────────< AJUSTES CONDICIONALES >───────────────────────
    Reglas que aplican según propiedades específicas de la fuente. -->
    <!-- Fuentes con peso > medium (negritas): Desactiva hinting para evitar
       distorsiones y usa filtro más ligero según documentación de FreeType. -->
    <match target="font">
        <test compare="more" name="weight">
            <const>medium</const>
        </test>
        <edit mode="assign" name="hintstyle">
            <const>hintnone</const>
        </edit>
        <edit mode="assign" name="lcdfilter">
            <const>lcdlight</const>
        </edit>
    </match>
    <!-- Normalizar peso: Si el peso es menor a medium, forzar a regular. -->
    <match target="pattern">
        <test compare="less" name="weight" qual="any">
            <const>medium</const>
        </test>
        <edit mode="assign" name="weight">
            <const>regular</const>
        </edit>
    </match>
</fontconfig>
